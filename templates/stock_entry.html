{% extends "base.html" %}
{% block content %}
<section class="card" style="max-width:800px;margin:0 auto;">
    <div class="card-header">
        <h2 class="card-title"><span>📥</span> {{ t.batch_entry }}</h2>
    </div>
    <form method="POST" action="{{ url_for('stock_entry') }}">
        <div class="form-group" style="margin-bottom:20px;">
            <label for="medicine_select">{{ t.existing_or_new }}</label>
            <select name="medicine_id" id="medicine_select" class="form-control">
                <option value="">-- Créer un nouveau médicament / إضافة دواء جديد --</option>
                {% for med in medicines %}
                    <option value="{{ med.id }}" data-buy="{{ med.buy_price }}" data-sell="{{ med.sell_price }}">{{ med.name }} (Actuel: {{ med.quantity }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
            <label for="new_name">{{ t.medicine_name }} (Si nouveau)</label>
            <input type="text" name="new_name" id="new_name" class="form-control" placeholder="Nom du médicament...">
        </div>
        <div class="form-group" style="margin-bottom:20px;">
            <label>Catégorie (Si nouveau médicament)</label>
            <select name="new_category" id="new_category" class="form-control">
                <option value="Général">-- Général --</option>
                {% for cat in parents %}
                    <optgroup label="{{ cat.name }}">
                        <option value="{{ cat.name }}">{{ cat.name }} (général)</option>
                        {% for sub in cat.children %}
                            <option value="{{ sub.name }}">↳ {{ sub.name }}</option>
                        {% endfor %}
                    </optgroup>
                {% endfor %}
            </select>
        </div>
        <div class="form-grid" style="margin-bottom:20px;grid-template-columns:1fr 1fr;">
            <div class="form-group"><label for="entry_buy_price">{{ t.buy_price }} ({{ t.currency }})</label><input type="number" step="0.01" name="buy_price" id="entry_buy_price" class="form-control" required></div>
            <div class="form-group"><label for="entry_sell_price">{{ t.sell_price }} ({{ t.currency }})</label><input type="number" step="0.01" name="sell_price" id="entry_sell_price" class="form-control" required></div>
        </div>
        <div class="form-group" style="margin-bottom:30px;">
            <label for="add_quantity">{{ t.add_quantity }}</label>
            <input type="number" name="add_quantity" class="form-control" min="1" value="10" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;height:50px;font-size:1.1rem;"><span>✅</span> {{ t.confirm_entry }}</button>
    </form>
</section>
{% endblock %}
